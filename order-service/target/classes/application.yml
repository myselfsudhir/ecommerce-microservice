
server:
  port: 8083
spring:
  application:
    name: order-service
  kafka:
    bootstrap-servers: localhost:9092
logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        slidingWindowSize: 5
        failureRateThreshold: 50
